name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security and syntax checks
        run: npm run check

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Build static frontend
        run: npm run build

      - name: Validate Worker bundle
        run: npm run deploy:dry
