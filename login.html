<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yönetici Girişi — Filementor Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Hanken Grotesk', sans-serif;
      background: #15130f;
      background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: #1c1a15;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 2rem;
    }
    .login-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #ff8a5c;
      text-align: center;
      margin-bottom: .75rem;
      letter-spacing: .4px;
    }
    .login-eyebrow::before { content: '; '; color: rgba(255,255,255,.35); }
    h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 1.5rem;
      text-align: center;
    }
    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .3px;
      color: #9c9686;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.14);
      background: #100e0b;
      color: #fff;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: 0.95rem;
    }
    input:focus { outline: 2px solid #ff4d1c; outline-offset: 1px; }
    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 6px;
      background: #ff4d1c;
      color: #fff;
      font-weight: 700;
      font-family: 'Hanken Grotesk', sans-serif;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background .15s;
    }
    button:hover { background: #c93807; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      color: #ff8a7a;
      font-size: 0.85rem;
      margin: -0.5rem 0 1rem;
      min-height: 1em;
    }
  </style>
  <script src="js/api-config.js?v=3"></script>
</head>
<body>
  <div class="login-box">
    <div class="login-eyebrow">YÖNETİM PANELİ</div>
    <h1>🔒 Yönetici Girişi</h1>
    <form id="login-form">
      <label for="username">Kullanıcı Adı</label>
      <input type="text" id="username" autocomplete="username" required />
      <label for="password">Şifre</label>
      <input type="password" id="password" autocomplete="current-password" required />
      <p class="error" id="error-msg"></p>
      <button type="submit" id="submit-btn">Giriş Yap</button>
    </form>
  </div>

  <script>
    // Backend adresini kendi API URL'inle değiştir (örn: https://filementor-api.onrender.com)
    const API_BASE = window.FILEMENTOR_API_BASE || "";

    const form = document.getElementById("login-form");
    const errorMsg = document.getElementById("error-msg");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Kontrol ediliyor...";

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(`${API_BASE}/api/admin/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include", // cookie gönderilsin/alınsın diye şart
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.ok) {
          window.location.href = "admin.html";
        } else {
          errorMsg.textContent = data.message || "Giriş başarısız.";
        }
      } catch (err) {
        errorMsg.textContent = "Sunucuya bağlanılamadı.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Giriş Yap";
      }
    });
  </script>
</body>
</html>
